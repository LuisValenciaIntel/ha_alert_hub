services:
  home-alert-hub:
    build:
      context: .
    container_name: home-alert-hub
    # If Home Assistant runs on the same Linux host and is only reachable there,
    # uncomment the next line and remove the ports mapping below:
    # network_mode: host
    ports:
      - "5000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME:-admin}
      APP_ADMIN_PASSWORD: ${APP_ADMIN_PASSWORD:-ChangeMe123!}
      TZ: ${TZ:-America/Mexico_City}
      HOME_ASSISTANT_API_TOKEN: ${HOME_ASSISTANT_API_TOKEN:-}
      HOME_ASSISTANT_BASE_URL: ${HOME_ASSISTANT_BASE_URL:-}
      HOME_ASSISTANT_ACCESS_TOKEN: ${HOME_ASSISTANT_ACCESS_TOKEN:-}
      HOME_ASSISTANT_AUTOMATION_ENTITY_ID: ${HOME_ASSISTANT_AUTOMATION_ENTITY_ID:-}
      HOME_ASSISTANT_BUTTON_LABEL: ${HOME_ASSISTANT_BUTTON_LABEL:-Run Home Assistant automation}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:5000}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-20}
    volumes:
      - ./instance:/app/instance
      - ./media:/app/media
    restart: unless-stopped

